<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Room</title>
<link rel="stylesheet" href="css/style.css">
</head><body><div class="container"><h1>Join Room</h1><div class="form"><input 
type="text" 
id="nameInput" 
placeholder="Enter your name"
required
/>

<input 
type="text" 
id="roomInput" 
placeholder="Enter Room ID"
required
/>

<button id="joinBtn" class="btn">
Join Room
</button></div><p id="error" class="error"></p></div><!-- Socket.IO --><script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script><!-- Socket Connection --><script src="js/socket.js"></script><script>

const joinBtn = document.getElementById("joinBtn");
const nameInput = document.getElementById("nameInput");
const roomInput = document.getElementById("roomInput");
const errorText = document.getElementById("error");

joinBtn.addEventListener("click", () => {

const name = nameInput.value.trim();
const roomId = roomInput.value.trim().toUpperCase();

if(!name || !roomId){
errorText.textContent = "Enter name and room ID";
return;
}

socket.emit("joinRoom", {name, roomId}, (data)=>{

if(data.error){
errorText.textContent = data.error;
return;
}

localStorage.setItem("playerName", name);
localStorage.setItem("roomId", roomId);

window.location.href = "lobby.html";

});

});

</script></body>
</html>
